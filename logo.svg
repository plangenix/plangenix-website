<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 56" fill="none">
  <!-- Gantt bars (left, with speed lines) -->
  <rect x="0" y="11" width="40" height="7" rx="3.5" fill="url(#bar1)"/>
  <rect x="5" y="23" width="34" height="7" rx="3.5" fill="url(#bar2)"/>
  <rect x="10" y="35" width="28" height="7" rx="3.5" fill="url(#bar3)"/>

  <!-- Connector lines to network -->
  <line x1="40" y1="14.5" x2="70" y2="19" stroke="#3dd6e8" stroke-width="1.1" stroke-dasharray="3 2" opacity="0.65"/>
  <line x1="39" y1="26.5" x2="70" y2="28" stroke="#7aaabb" stroke-width="1.1" stroke-dasharray="3 2" opacity="0.45"/>
  <line x1="38" y1="38.5" x2="70" y2="37" stroke="#7aaabb" stroke-width="1.1" stroke-dasharray="3 2" opacity="0.45"/>

  <!-- Network edges -->
  <line x1="70" y1="19" x2="86" y2="11" stroke="#7aaabb" stroke-width="1.1" opacity="0.5"/>
  <line x1="70" y1="19" x2="86" y2="28" stroke="#3dd6e8" stroke-width="1.1" opacity="0.65"/>
  <line x1="70" y1="19" x2="70" y2="37" stroke="#7aaabb" stroke-width="1.1" opacity="0.4"/>
  <line x1="86" y1="11" x2="98" y2="19" stroke="#7aaabb" stroke-width="1.1" opacity="0.5"/>
  <line x1="86" y1="28" x2="98" y2="19" stroke="#3dd6e8" stroke-width="1.1" opacity="0.65"/>
  <line x1="86" y1="28" x2="98" y2="37" stroke="#7aaabb" stroke-width="1.1" opacity="0.4"/>
  <line x1="70" y1="37" x2="86" y2="28" stroke="#7aaabb" stroke-width="1.1" opacity="0.4"/>
  <line x1="70" y1="37" x2="98" y2="37" stroke="#3dd6e8" stroke-width="1.1" opacity="0.5"/>

  <!-- Network nodes -->
  <circle cx="86" cy="11" r="5" fill="#7aaabb" opacity="0.65"/>
  <circle cx="98" cy="19" r="5.5" fill="url(#tealNode1)"/>
  <circle cx="86" cy="28" r="6"   fill="url(#tealNode2)"/>
  <circle cx="70" cy="19" r="5"   fill="url(#tealNode3)"/>
  <circle cx="70" cy="37" r="4.5" fill="#7aaabb" opacity="0.55"/>
  <circle cx="98" cy="37" r="4.5" fill="#7aaabb" opacity="0.45"/>

  <!-- Highlights on teal nodes -->
  <circle cx="98" cy="19" r="2.2" fill="white" opacity="0.35"/>
  <circle cx="86" cy="28" r="2.8" fill="white" opacity="0.45"/>
  <circle cx="70" cy="19" r="1.8" fill="white" opacity="0.3"/>

  <!-- Wordmark -->
  <text x="114" y="37" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="700" letter-spacing="-0.4" fill="url(#silverText)">Plan</text>
  <text x="158" y="37" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="25" font-weight="700" letter-spacing="-0.4" fill="url(#tealText)">Genix</text>

  <defs>
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#aabccc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3dd6e8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7899aa" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6abfcc" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="5588aa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#48aabc" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="tealNode1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4de0f0"/>
      <stop offset="100%" stop-color="#00a8bb"/>
    </radialGradient>
    <radialGradient id="tealNode2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5de8f8"/>
      <stop offset="100%" stop-color="#00c4d4"/>
    </radialGradient>
    <radialGradient id="tealNode3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3dd6e8"/>
      <stop offset="100%" stop-color="#0096a8"/>
    </radialGradient>
    <linearGradient id="silverText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8e8f0"/>
      <stop offset="100%" stop-color="#90aabb"/>
    </linearGradient>
    <linearGradient id="tealText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c4d4"/>
      <stop offset="100%" stop-color="#3dd6e8"/>
    </linearGradient>
  </defs>
</svg>
